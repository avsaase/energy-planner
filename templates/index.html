<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Energy Planner</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
    <script src="https://cdn.plot.ly/plotly-3.0.1.min.js"></script>
    <style>
        :root {
            color-scheme: light;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            margin: 0;
            padding: 1rem;
            overflow-x: hidden;
        }

        main {
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        h1 {
            margin: 0 0 0.25rem;
            font-size: 1.4rem;
        }

        .meta {
            color: #555;
            margin: 0 0 1rem;
            font-size: 0.95rem;
        }

        .overview {
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #fafafa;
            padding: 0.9rem;
            margin: 0 0 1rem;
        }

        .overview-title {
            margin: 0 0 0.5rem;
            font-size: 1rem;
        }

        .overview-grid {
            display: grid;
            gap: 0.35rem 1rem;
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .overview-item {
            margin: 0;
            font-size: 0.92rem;
            color: #222;
        }

        .overview-item strong {
            color: #555;
            font-weight: 600;
        }

        .empty {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 1rem;
            background: #fafafa;
        }

        /* Keep Plotly figures inside the viewport width. */
        .js-plotly-plot,
        .plot-container,
        .plotly-graph-div {
            width: 100% !important;
            max-width: 100% !important;
            box-sizing: border-box;
        }

        @media (max-width: 700px) {
            body {
                padding: 0.6rem;
            }

            h1 {
                font-size: 1.2rem;
            }

            .meta {
                font-size: 0.88rem;
            }

            .overview-grid {
                grid-template-columns: 1fr;
            }

        }
    </style>
</head>
<body>
    <main>
        <h1>Energy Planning</h1>
        <div
            id="planning-overview-live"
            hx-ext="sse"
            sse-connect="/events/planning"
            hx-get="/plan-overview-content"
            hx-trigger="sse:plan-update"
            hx-swap="innerHTML"
        >
            {{ plan_overview_content_html|safe }}
        </div>
        <div id="planning-plot-live">{{ plot_content_html|safe }}</div>
        <script>
            let preservedScrollY = null;

            function executeInlineScripts(container) {
                const scripts = container.querySelectorAll("script");
                scripts.forEach((oldScript) => {
                    const newScript = document.createElement("script");
                    if (oldScript.src) {
                        newScript.src = oldScript.src;
                    }
                    newScript.text = oldScript.text;
                    oldScript.replaceWith(newScript);
                });
            }

            function disablePlotlyZoomPan() {
                if (!window.Plotly) {
                    return;
                }

                const lockInteractions = () => {
                    const plots = document.querySelectorAll(".js-plotly-plot");
                    plots.forEach((plot) => {
                        const updates = { dragmode: false };
                        const layout = plot.layout || {};

                        Object.keys(layout).forEach((axisKey) => {
                            if (/^[xy]axis\d*$/.test(axisKey)) {
                                updates[`${axisKey}.fixedrange`] = true;
                            }
                        });

                        if (Object.keys(updates).length === 1) {
                            updates["xaxis.fixedrange"] = true;
                            updates["yaxis.fixedrange"] = true;
                        }

                        window.Plotly.relayout(plot, updates).catch(() => {});
                    });
                };

                // Inline plot scripts run during HTML parse; defer one tick to ensure plots exist.
                window.requestAnimationFrame(lockInteractions);
            }

            disablePlotlyZoomPan();

            function restoreScrollPosition(scrollY) {
                if (typeof scrollY !== "number") {
                    return;
                }

                window.scrollTo(window.scrollX, scrollY);
                // Plotly redraw can shift layout one frame later.
                window.requestAnimationFrame(() => window.scrollTo(window.scrollX, scrollY));
            }

            async function refreshPlotContent(scrollY) {
                const plotContainer = document.getElementById("planning-plot-live");
                if (!plotContainer) {
                    return;
                }

                try {
                    const response = await fetch("/plot-content", { cache: "no-store" });
                    if (!response.ok) {
                        return;
                    }

                    const html = await response.text();
                    plotContainer.innerHTML = html;
                    executeInlineScripts(plotContainer);
                    disablePlotlyZoomPan();
                    restoreScrollPosition(scrollY);
                } catch (_) {
                    // Keep showing the last successful plot when refresh fails.
                }
            }

            document.body.addEventListener("htmx:beforeSwap", function (event) {
                if (event.target && event.target.id === "planning-overview-live") {
                    preservedScrollY = window.scrollY;
                }
            });

            // HTMX updates overview content; refresh the plot separately to avoid HTMX swapping Plotly markup.
            document.body.addEventListener("htmx:afterSwap", async function (event) {
                if (event.target && event.target.id === "planning-overview-live") {
                    const currentScrollY = preservedScrollY ?? window.scrollY;
                    await refreshPlotContent(currentScrollY);
                    restoreScrollPosition(currentScrollY);
                    preservedScrollY = null;
                }
            });
        </script>
    </main>
</body>
</html>
