<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Energy Planner</title>
    <script src="https://cdn.plot.ly/plotly-3.0.1.min.js"></script>
    <style>
        :root {
            color-scheme: light;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            margin: 0;
            padding: 1rem;
            overflow-x: hidden;
        }

        main {
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        h1 {
            margin: 0 0 0.25rem;
            font-size: 1.4rem;
        }

        .meta {
            color: #555;
            margin: 0 0 1rem;
            font-size: 0.95rem;
        }

        .actions {
            margin: 0 0 1rem;
        }

        .notify-btn {
            border: 1px solid #bbb;
            border-radius: 6px;
            background: #f4f4f4;
            padding: 0.45rem 0.8rem;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .notify-btn:hover {
            background: #e9e9e9;
        }

        .empty {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 1rem;
            background: #fafafa;
        }

        /* Keep Plotly figures inside the viewport width. */
        .js-plotly-plot,
        .plot-container,
        .plotly-graph-div {
            width: 100% !important;
            max-width: 100% !important;
            box-sizing: border-box;
        }

        @media (max-width: 700px) {
            body {
                padding: 0.6rem;
            }

            h1 {
                font-size: 1.2rem;
            }

            .meta {
                font-size: 0.88rem;
            }

            .notify-btn {
                width: 100%;
                padding: 0.6rem 0.8rem;
            }
        }
    </style>
</head>
<body>
    <main>
        <h1>Energy Planning</h1>
        <form class="actions" method="post" action="/start-plan">
            <button class="notify-btn" type="submit">Start new planning</button>
        </form>
        {% if has_plot %}
        <p class="meta">Generated for {{ interval_count }} intervals.</p>
        {{ plot_html|safe }}
        {% else %}
        <p class="meta">No planning result available yet.</p>
        <div class="empty">The optimizer has not published a planning result yet.</div>
        {% endif %}
    </main>
</body>
</html>
