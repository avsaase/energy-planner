name: Build And Publish Addon Image

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            build_from: ghcr.io/home-assistant/amd64-base:3.19
          # - arch: aarch64
          #   platform: linux/arm64
          #   build_from: ghcr.io/home-assistant/aarch64-base:3.19
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Cache Rust Build
        uses: swatinem/rust-cache@v2

      - name: Install Native Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang cmake libclang-dev musl-tools pkg-config

      - name: Build Release Binary
        env:
          CC_x86_64_unknown_linux_musl: musl-gcc
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Prepare Docker Build Context Binary
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-musl/release/energy-planner dist/energy-planner
          chmod +x dist/energy-planner

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log In To GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read Add-on Version
        id: addon_version
        run: |
          VERSION="$(awk -F '"' '/^version:/{print $2; exit}' config.yaml)"
          if [ -z "$VERSION" ]; then
            echo "Failed to extract version from config.yaml"
            exit 1
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.arch }}-energy-planner
          tags: |
            type=raw,value=${{ steps.addon_version.outputs.value }}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build And Push Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: ${{ matrix.platform }}
          build-args: |
            BUILD_FROM=${{ matrix.build_from }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=publish-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=publish-${{ matrix.arch }}
