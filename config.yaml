name: "Energy Planner"
version: "0.1.2"
slug: "energy_planner"
description: "LP-based energy optimization"
arch:
  - amd64
  # - aarch64
url: "https://github.com/avsaase/energy-planner"
ingress: true
ingress_port: 8099
panel_icon: "mdi:battery-charging"
panel_title: "Energy Planner"
image: "ghcr.io/avsaase/{arch}-energy-planner"
options:
  solar_forecast_entities:
    - "sensor.energy_production_today_2"
    - "sensor.energy_production_tomorrow_2"
  electricity_price_entity: "sensor.frank_energie_prijzen_huidige_elektriciteit_inkoopprijs"
  battery_parameters:
    capacity_wh: 5120
    max_charge_power_w: 2500
    max_discharge_power_w: 2500
    charge_efficiency: 0.88
    discharge_efficiency: 0.88
    min_soc_percent: 0.1
    max_soc_percent: 1.0
  electricity_price_parameters:
    supplier_cost_import_eur_per_kwh: 0.0182
    supplier_cost_export_eur_per_kwh: 0.0182
    energy_tax_import_eur_per_kwh: 0.09161
    energy_tax_export_eur_per_kwh: 0.0
    vat_import: 0.21
    vat_export: 0.0
  grid_limit_w: 10000
  consumption_profile:
    - start: "00:00"
      end: "06:00"
      load_w: 200
    - start: "06:00"
      end: "17:00"
      load_w: 300
    - start: "17:00"
      end: "00:00"
      load_w: 450
schema:
  solar_forecast_entities:
    - str
  electricity_price_entity: str
  battery_parameters:
    capacity_wh: float
    max_charge_power_w: float
    max_discharge_power_w: float
    charge_efficiency: float
    discharge_efficiency: float
    min_soc_percent: float
    max_soc_percent: float
  electricity_price_parameters:
    supplier_cost_import_eur_per_kwh: float
    supplier_cost_export_eur_per_kwh: float
    energy_tax_import_eur_per_kwh: float
    energy_tax_export_eur_per_kwh: float
    vat_import: float
    vat_export: float
  grid_limit_w: float
  consumption_profile:
    - start: str
      end: str
      load_w: float